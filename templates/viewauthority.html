<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAI | Authority Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00d4ff;
            --bg: #050505;
            --danger: #ff4d4d;
        }

        body {
            margin: 0; padding: 40px;
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 50px auto;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin: 0;
        }

        .btn-add {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-add:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        /* Tactical Card Grid */
        .personnel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .personnel-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 25px;
            backdrop-filter: blur(15px);
            position: relative;
            transition: 0.4s;
        }

        .personnel-card:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
        }

        .card-top {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
        }

        .info-main h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .position-tag {
            display: inline-block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-top: 5px;
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px 0;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .detail-item label {
            display: block;
            font-size: 0.6rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .detail-item span {
            font-size: 0.85rem;
            color: #ccc;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .edit {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
        }

        .edit:hover { background: rgba(255, 255, 255, 0.1); }

        .delete {
            background: rgba(255, 77, 77, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        .delete:hover { background: var(--danger); color: #000; }

    </style>
</head>
<body>

    <div class="header">
        <div>
            <p style="color: var(--accent); font-size: 0.7rem; letter-spacing: 3px; margin: 0 0 5px 0;">PERSONNEL MANAGEMENT</p>
            <h1>Authority Nodes</h1>
        </div>
        <a href="/myapp/authority_get/" class="btn-add">+ ADD NEW AUTHORITY</a>
    </div>

    <div class="personnel-grid">
        {% for i in data %}
        <div class="personnel-card">
            <div class="card-top">
                <img src="{{ i.photo.url }}" class="profile-img" alt="Profile">
                <div class="info-main">
                    <h2>{{ i.auth_name }}</h2>
                    <span class="position-tag">{{ i.position }}</span>
                </div>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <label>Contact</label>
                    <span>{{ i.phoneNo }}</span>
                </div>
                <div class="detail-item">
                    <label>Gender</label>
                    <span>{{ i.gender }}</span>
                </div>
                <div class="detail-item">
                    <label>Date of Birth</label>
                    <span>{{ i.dob }}</span>
                </div>
                <div class="detail-item">
                    <label>Email Node</label>
                    <span>{{ i.Email }}</span>
                </div>
            </div>

            <div class="card-actions">
                <a href="/myapp/editauthority_get/{{ i.id }}" class="btn-action edit">EDIT CONFIG</a>
                <a href="/myapp/deleteauthority/{{ i.id }}" class="btn-action delete">TERMINATE</a>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
