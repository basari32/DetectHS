<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAI | Broadcast Awareness</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.2);
            --bg: #050505;
            --warning: #ffaa00;
        }

        body {
            margin: 0; padding: 20px;
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .broadcast-container {
            width: 100%;
            max-width: 650px;
            padding: 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header-meta {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-meta span {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
        }

        .header-meta h1 {
            font-size: 1.8rem;
            font-weight: 300;
            margin: 10px 0 0 0;
            letter-spacing: -1px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            padding-left: 5px;
        }

        input[type="text"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        textarea { height: 120px; resize: none; }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Legal Warning Box */
        .warning-input {
            border-color: rgba(255, 170, 0, 0.2);
            color: var(--warning);
        }

        .warning-input:focus {
            border-color: var(--warning);
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            margin-top: 30px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .hint {
            font-size: 0.6rem;
            color: #444;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="broadcast-container">
        <div class="header-meta">
            <span>Security Awareness Hub</span>
            <h1>Issue New Broadcast</h1>
        </div>

        <form action="/myapp/add_awareness_post/" method="post" enctype="multipart/form-data">
            <div class="form-grid">

                <div class="form-group full-width">
                    <label>Broadcast Title</label>
                    <input type="text" name="title" placeholder="e.g. Safety Protocol: Noise Pollution Standards" required>
                </div>

                <div class="form-group full-width">
                    <label>Description / Guidelines</label>
                    <textarea name="description" placeholder="Provide detailed information for the public..."></textarea>
                </div>

                <div class="form-group">
                    <label>Infographic / File</label>
                    <input type="file" name="file" required>
                    <span class="hint">Upload safety posters or legal documents (JPG/PNG/PDF)</span>
                </div>

                <div class="form-group">
                    <label style="color: var(--warning);">Legal Punishment / Fine</label>
                    <input type="text" name="punishment" class="warning-input" placeholder="e.g. Fine up to ₹5000 or 6 months jail">
                </div>

            </div>

            <button type="submit" class="submit-btn">INITIATE GLOBAL BROADCAST</button>
        </form>
    </div>

</body>
</html>
