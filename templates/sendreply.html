<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAI | Dispatch Reply</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.2);
            --bg: #050505;
            --error: #ff4d4d;
        }

        body {
            margin: 0; padding: 20px;
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .reply-container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header-meta {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-meta span {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
        }

        .header-meta h1 {
            font-size: 1.8rem;
            font-weight: 300;
            margin: 10px 0 0 0;
            letter-spacing: -1px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Validation Style */
        textarea.invalid {
            border-color: var(--error);
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.1);
        }

        .error-message {
            color: var(--error);
            font-size: 0.65rem;
            margin-top: 8px;
            display: none;
            padding-left: 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .submit-btn:disabled {
            background: #222;
            color: #444;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="reply-container">
        <div class="header-meta">
            <span>Communication Outbound</span>
            <h1>Resolve Grievance</h1>
        </div>

        <form id="replyForm" action="/myapp/sendreply_post/" method="post" onsubmit="return validateForm()">
            {% csrf_token %}
            <input type="hidden" name="id" value="{{ id }}">

            <div class="form-group">
                <label>Official Response</label>
                <textarea id="replyText" name="reply" placeholder="Type the resolution details..."></textarea>
                <div id="errorBox" class="error-message">Error: Dispatch content cannot be null.</div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">
                TRANSMIT DISPATCH
            </button>
        </form>
    </div>

    <script>
        function validateForm() {
            const reply = document.getElementById('replyText');
            const errorBox = document.getElementById('errorBox');
            const submitBtn = document.getElementById('submitBtn');

            // Reset styles
            reply.classList.remove('invalid');
            errorBox.style.display = 'none';

            // Check for empty or whitespace-only strings
            if (reply.value.trim() === "") {
                reply.classList.add('invalid');
                errorBox.style.display = 'block';
                reply.focus();
                return false; // Prevent form submission
            }

            // Visual feedback for submission
            submitBtn.innerText = "INITIALIZING TRANSMISSION...";
            submitBtn.disabled = true;
            return true;
        }

        // Live reset on typing
        document.getElementById('replyText').addEventListener('input', function() {
            this.classList.remove('invalid');
            document.getElementById('errorBox').style.display = 'none';
        });
    </script>

</body>
</html>
